services:
  age-prediction:
    build: .
    shm_size: "2gb"
    image: age-prediction-gpu
    container_name: age_dev
    ports:
      - "8080:8080" # Optuna Dashboard
      - "6006:6006" # TensorBoard
      - "8000:8000" # FastAPI
    volumes:
      - .:/app
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    stdin_open: true # Equivalent de -i
    tty: true # Equivalent de -t
    working_dir: /app
